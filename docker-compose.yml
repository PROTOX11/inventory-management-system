version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inventory_db
    environment:
      POSTGRES_USER: ${DB_USER:-inventory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventory_password}
      POSTGRES_DB: ${DB_NAME:-inventory_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inventory_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-inventory_user}:${DB_PASSWORD:-inventory_password}@postgres:5432/${DB_NAME:-inventory_db}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_web
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
